<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Burst The Balloon</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; }

/* SKY BACKGROUND */
#bg {
  position:fixed;
  width:100%;
  height:100%;
  background: linear-gradient(to top, #4facfe, #00f2fe);
  z-index:-2;
}

/* SUN */
#sun {
  position:absolute;
  width:100px;
  height:100px;
  background: radial-gradient(circle, #fff200, #ffae00);
  border-radius:50%;
  top:40px;
  right:60px;
  box-shadow:0 0 40px rgba(255,200,0,0.7);
}

/* CLOUDS */
.cloud {
  position:absolute;
  background:white;
  border-radius:50%;
  opacity:0.9;
  animation: moveCloud linear infinite;
}

@keyframes moveCloud {
  from { transform:translateX(-200px); }
  to { transform:translateX(120vw); }
}

/* BIRDS */
.bird {
  position:absolute;
  font-size:20px;
  animation: fly 12s linear infinite;
}

@keyframes fly {
  from { transform:translateX(-50px); }
  to { transform:translateX(120vw); }
}

/* START SCREEN */
#startScreen {
  position:absolute;
  width:100%;
  height:100%;
  background:#222;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

button {
  padding:12px 25px;
  font-size:20px;
  border:none;
  border-radius:10px;
  background:orange;
  color:white;
}

/* SCORE + TIMER */
#topBar {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:22px;
  display:none;
}

/* BALLOON */
.balloon {
  position:absolute;
  width:60px;
  height:80px;
  border-radius:50% 50% 45% 45%;
  cursor:pointer;
  box-shadow:
    inset -10px -15px 20px rgba(0,0,0,0.3),
    inset 5px 5px 10px rgba(255,255,255,0.4),
    0 8px 15px rgba(0,0,0,0.4);
}

.balloon::before {
  content:'';
  position:absolute;
  width:15px;
  height:20px;
  background:rgba(255,255,255,0.6);
  border-radius:50%;
  top:10px;
  left:12px;
}

.balloon::after {
  content:'';
  position:absolute;
  width:2px;
  height:40px;
  background:#444;
  bottom:-40px;
  left:50%;
}

/* END SCREEN */
#endScreen {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:30px;
}
</style>
</head>

<body>

<div id="bg">
  <div id="sun"></div>
</div>

<div id="startScreen">
  <h1>🎈 Burst The Balloon</h1>
  <button onclick="startGame()">Play</button>
</div>

<div id="topBar">
  Score: <span id="score">0</span> |
  Time: <span id="time">30</span> |
  Target: 15
</div>

<div id="endScreen">
  <div id="resultText"></div>
  <button onclick="location.reload()">Play Again</button>
</div>

<script>
let score = 0;
let time = 30;
let target = 15;
let playing = false;

/* CREATE CLOUDS */
for(let i=0;i<6;i++){
  let c=document.createElement('div');
  c.className='cloud';
  c.style.width=(100+Math.random()*120)+'px';
  c.style.height=(50+Math.random()*60)+'px';
  c.style.top=Math.random()*200+'px';
  c.style.animationDuration=(20+Math.random()*20)+'s';
  document.getElementById('bg').appendChild(c);
}

/* CREATE BIRDS */
for(let i=0;i<3;i++){
  let b=document.createElement('div');
  b.className='bird';
  b.innerText='🐦';
  b.style.top=(50+Math.random()*200)+'px';
  b.style.animationDuration=(10+Math.random()*5)+'s';
  document.getElementById('bg').appendChild(b);
}

function startGame(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("topBar").style.display="block";
  playing = true;

  createBalloonLoop();
  startTimer();
}

function startTimer(){
  let t = setInterval(()=>{
    if(!playing) return;

    time--;
    document.getElementById("time").innerText = time;

    if(time <= 0){
      clearInterval(t);
      endGame();
    }
  },1000);
}

function endGame(){
  playing = false;

  let text = score >= target ? "🎉 You Win!" : "❌ You Lose!";
  document.getElementById("resultText").innerText = text;
  document.getElementById("endScreen").style.display="flex";
}

function createBalloonLoop(){
  setInterval(()=>{
    if(playing) createBalloon();
  },600);
}

function createBalloon(){
  let b = document.createElement("div");
  b.className = "balloon";

  let color = `hsl(${Math.random()*360},70%,60%)`;
  b.style.background = color;

  b.style.left = Math.random()*window.innerWidth + "px";
  b.style.bottom = "0px";

  document.body.appendChild(b);

  let drift = (Math.random()*2-1);

  let rise = setInterval(()=>{
    let bottom = parseInt(b.style.bottom);
    let left = parseInt(b.style.left);

    b.style.bottom = bottom + 3 + "px";
    b.style.left = left + drift + "px";

    if(bottom > window.innerHeight){
      b.remove();
      clearInterval(rise);
    }
  },20);

  b.onclick = function(){
    if(!playing) return;

    score++;
    document.getElementById("score").innerText = score;

    b.remove();
    clearInterval(rise);
  };
}
</script>

</body>
</html>
