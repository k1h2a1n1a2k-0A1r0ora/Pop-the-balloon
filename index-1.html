<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Burst The Balloon</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }

/* BACKGROUND */
#gameBackground {
  position:fixed;
  width:100%;
  height:100%;
  background: linear-gradient(to top, #4facfe, #00f2fe);
  z-index:-2;
}

/* START SCREEN */
#startScreen {
  position:absolute;
  width:100%;
  height:100%;
  background: linear-gradient(to bottom, #141e30, #243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  z-index:10;
}

h1 { font-size:40px; }

#playBtn {
  padding:15px 30px;
  font-size:22px;
  border:none;
  border-radius:10px;
  background:orange;
  color:white;
  cursor:pointer;
}

#score {
  position:absolute;
  top:10px;
  left:10px;
  font-size:22px;
  color:white;
  display:none;
}

/* WIN SCREEN */
#winScreen {
  position:absolute;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:30px;
  display:none;
}

/* BALLOON */
.balloon {
  position:absolute;
  width:60px;
  height:80px;
  border-radius:50%;
  cursor:pointer;
}

/* PRAISE TEXT */
#praise {
  position:absolute;
  font-size:30px;
  color:white;
  display:none;
}
</style>
</head>

<body>

<div id="gameBackground"></div>

<div id="startScreen">
  <h1>🎈 Burst The Balloon</h1>
  <button id="playBtn">Play</button>
</div>

<div id="score">Score: 0</div>
<div id="praise"></div>

<div id="winScreen">
  🎉 You Win! 🎉
  <button onclick="location.reload()">Play Again</button>
</div>

<script>
let score = 0;
let target = 10;

const praises = ["Great!", "Awesome!", "Wow!", "Nice!", "Super!"];

function showPraise(x, y){
  let p = document.getElementById('praise');
  p.innerText = praises[Math.floor(Math.random()*praises.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";
  p.style.display = "block";

  setTimeout(()=>p.style.display="none",500);
}

function createBalloon(){
  const balloon = document.createElement('div');
  balloon.classList.add('balloon');

  const color = `hsl(${Math.random()*360},70%,60%)`;
  balloon.style.background = color;

  balloon.style.left = Math.random()*window.innerWidth + 'px';
  balloon.style.bottom = '0px';

  document.body.appendChild(balloon);

  let rise = setInterval(()=>{
    let bottom = parseInt(balloon.style.bottom);
    balloon.style.bottom = bottom + 3 + 'px';

    if(bottom > window.innerHeight){
      balloon.remove();
      clearInterval(rise);
    }
  },20);

  balloon.addEventListener('click',(e)=>{
    score++;
    document.getElementById('score').innerText = 'Score: ' + score;

    showPraise(e.clientX, e.clientY);

    balloon.remove();
    clearInterval(rise);

    if(score >= target){
      document.getElementById('winScreen').style.display = 'flex';
    }
  });
}

function startGame(){
  document.getElementById('startScreen').style.display='none';
  document.getElementById('score').style.display='block';

  setInterval(createBalloon,700);
}

document.getElementById('playBtn').addEventListener('click',startGame);
</script>

</body>
</html>
